name: "Deploy to AWS S3"
description: "Deploy a static website to AWS S3"
inputs:
  bucket:
    descripton: "The S3 bucket name."
    required: true
  bucket-region:
    descripton: "The S3 bucket region."
    required: false
    default: "us-east-1"
  dist-folder:
    descripton: "The folder containing the deployable files."
    required: true
outputs:
  website-url:
    description: "The URL of the deployed website."
runs:
  using: "docker"
  image: "Dockerfile"
